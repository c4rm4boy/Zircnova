<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Zircnova</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue: #5795d2;
      --blue-dark: #3a6fad;
      --blue-hover: #062fb2;
      --text: #222222;
      --text-body: #000000;
      --border: #ededed;
      --bg2: #f6f6f6;
      --gold: #c8a84b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Barlow', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      color: var(--text-body);
      background: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* â”€â”€ Announcement Bar â”€â”€ */
    .announce-bar {
      background: var(--blue);
      color: #fff;
      text-align: center;
      padding: 9px 16px;
      font-size: 13px;
      letter-spacing: .03em;
    }
    .announce-bar a { color: #fff; text-decoration: underline; font-weight: 600; }

    /* â”€â”€ Header â”€â”€ */
    header {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .header-inner {
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 88px;
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 26px;
      letter-spacing: -0.5px;
      color: #1a1a1a;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 2px;
      white-space: nowrap;
    }
    .logo-dot {
      width: 10px; height: 10px;
      background: var(--gold);
      border-radius: 50%;
      display: inline-block;
      margin-bottom: 6px;
    }
    .search-wrap {
      flex: 1;
      display: flex;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      height: 44px;
    }
    .search-wrap input {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 16px;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      color: var(--text);
    }
    .search-wrap button {
      background: var(--blue);
      border: none;
      color: #fff;
      padding: 0 18px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      transition: background .2s;
    }
    .search-wrap button:hover { background: var(--blue-hover); }
    .header-icons {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .icon-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
      color: var(--text);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: .04em;
      font-weight: 500;
      transition: color .2s;
    }
    .icon-btn:hover { color: var(--blue); }
    .icon-btn svg { width: 22px; height: 22px; }
    .cart-icon { position: relative; }
    .cart-badge {
      position: absolute;
      top: -6px; right: -8px;
      background: #DA3F3F;
      color: #fff;
      border-radius: 50%;
      width: 18px; height: 18px;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    /* â”€â”€ Nav â”€â”€ */
    nav {
      background: #fff;
      border-bottom: 2px solid var(--border);
    }
    .nav-inner {
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 0;
      height: 44px;
    }
    .nav-item {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      padding: 0 14px;
      height: 44px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
      white-space: nowrap;
    }
    .nav-item:hover, .nav-item.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
    }
    .nav-cta {
      margin-left: auto;
      background: var(--blue);
      color: #fff !important;
      border-radius: 2px;
      padding: 0 18px !important;
      border-bottom: none !important;
      font-weight: 700;
      transition: background .2s !important;
    }
    .nav-cta:hover { background: var(--blue-hover) !important; color: #fff !important; }

    /* â”€â”€ Register Page â”€â”€ */
    .register-section {
      min-height: calc(100vh - 280px);
      padding: 60px 24px 80px;
      background: #fff;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .register-container {
      width: 100%;
      max-width: 440px;
    }
    .register-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 10px;
    }
    .register-login-prompt {
      text-align: center;
      font-size: 14px;
      color: #555;
      margin-bottom: 32px;
    }
    .register-login-prompt a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: none;
    }
    .register-login-prompt a:hover { text-decoration: underline; }

    .form-field {
      margin-bottom: 16px;
    }
    .form-field input {
      width: 100%;
      border: 1px solid #d0d0d0;
      border-radius: 3px;
      padding: 13px 16px;
      font-size: 14px;
      font-family: 'Barlow', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
      background: #fff;
    }
    .form-field input::placeholder { color: #aaa; }
    .form-field input:focus { border-color: var(--blue); }

    .register-btn {
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: 3px;
      padding: 15px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s;
    }
    .register-btn:hover { background: var(--blue-hover); }
    .register-btn:disabled { background: #9dbee5; cursor: not-allowed; }

    .return-link {
      display: block;
      text-align: center;
      margin: 18px 0 28px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #666;
      text-decoration: none;
    }
    .return-link:hover { color: var(--blue); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }
    .divider span {
      font-size: 12px;
      color: #999;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* â”€â”€ Social Buttons â”€â”€ */
    .social-btn {
      display: flex;
      align-items: center;
      width: 100%;
      border: none;
      border-radius: 3px;
      padding: 12px 16px;
      font-family: 'Barlow', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      margin-bottom: 10px;
      text-decoration: none;
      transition: opacity .2s, transform .1s;
      position: relative;
    }
    .social-btn:hover { opacity: .9; transform: translateY(-1px); }
    .social-btn:active { transform: translateY(0); }
    .social-btn .s-icon {
      width: 22px;
      height: 22px;
      margin-right: 14px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .social-btn .s-label { flex: 1; text-align: center; padding-right: 22px; }

    .social-facebook { background: #1877f2; }
    .social-google { background: #DB4437; }
    .social-linkedin { background: #0077b5; }
    .social-microsoft { background: #2f2f2f; }
    .social-amazon { background: #ff9900; color: #111; }
    .social-amazon .s-icon { color: #111; }

    /* â”€â”€ Status Message â”€â”€ */
    .status-msg {
      padding: 12px 16px;
      border-radius: 3px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .status-msg.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; display: block; }
    .status-msg.error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; display: block; }

    /* â”€â”€ Footer â”€â”€ */
    footer {
      background: #1a1a1a;
      color: #ccc;
      padding: 48px 24px 24px;
    }
    .footer-inner { max-width: 1240px; margin: 0 auto; }
    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
      gap: 40px;
      margin-bottom: 40px;
    }
    .footer-logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: #fff;
      margin-bottom: 12px;
    }
    .footer-tagline { font-size: 13px; line-height: 1.7; color: #999; margin-bottom: 20px; }
    .footer-socials { display: flex; gap: 10px; }
    .footer-socials a {
      width: 34px; height: 34px;
      background: #2e2e2e;
      color: #ccc;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      text-decoration: none;
      transition: background .2s;
    }
    .footer-socials a:hover { background: var(--blue); color: #fff; }
    .footer-col-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 16px;
    }
    .footer-links { list-style: none; }
    .footer-links li { margin-bottom: 8px; }
    .footer-links a { color: #999; text-decoration: none; font-size: 13px; transition: color .15s; }
    .footer-links a:hover { color: #fff; }
    .footer-bottom {
      border-top: 1px solid #2e2e2e;
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #666;
    }
    .footer-bottom a { color: #666; text-decoration: none; }
    .footer-bottom a:hover { color: #ccc; }
  </style>
</head>
<body data-page="register">

<div id="site-header"></div>

<!-- Register Section -->
<section class="register-section">
  <div class="register-container">
    <h1 class="register-title">Create Account</h1>
    <p class="register-login-prompt">Already have an account? <a href="#">LOG IN</a></p>

    <div id="status-msg" class="status-msg"></div>

    <form id="register-form" novalidate>
      <div class="form-field">
        <input type="text" id="first-name" name="first_name" placeholder="First name" required autocomplete="given-name" />
      </div>
      <div class="form-field">
        <input type="text" id="last-name" name="last_name" placeholder="Last name" required autocomplete="family-name" />
      </div>
      <div class="form-field">
        <input type="email" id="email" name="email" placeholder="Email" required autocomplete="email" />
      </div>
      <div class="form-field">
        <input type="password" id="password" name="password" placeholder="Password" required autocomplete="new-password" minlength="8" />
      </div>

      <button type="submit" class="register-btn" id="submit-btn">Create My Account</button>
    </form>

    <a href="index.html" class="return-link">â† Return to Store</a>

    <div class="divider"><span>or sign in with</span></div>

    <!-- Facebook -->
    <button class="social-btn social-facebook" onclick="signInWithProvider('facebook')">
      <span class="s-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
      </span>
      <span class="s-label">Sign in with Facebook</span>
    </button>

    <!-- Google -->
    <button class="social-btn social-google" onclick="signInWithProvider('google')">
      <span class="s-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/></svg>
      </span>
      <span class="s-label">Sign in with Google</span>
    </button>

    <!-- LinkedIn -->
    <button class="social-btn social-linkedin" onclick="signInWithProvider('linkedin_oidc')">
      <span class="s-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </span>
      <span class="s-label">Sign in with LinkedIn</span>
    </button>

    <!-- Microsoft -->
    <button class="social-btn social-microsoft" onclick="signInWithProvider('azure')">
      <span class="s-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zM24 11.4H12.6V0H24v11.4z"/></svg>
      </span>
      <span class="s-label">Sign in with Microsoft</span>
    </button>

    <!-- Amazon -->
    <button class="social-btn social-amazon" onclick="signInWithProvider('amazon')">
      <span class="s-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M.045 18.02c.72-.403 4.843-2.375 9.84-1.723 2.45.32 5.19 1.33 7.14 2.07-.404.33-.888.6-1.39.83-1.87.87-4.29 1.38-6.64 1.38C5.13 20.577 2.23 19.7.045 18.02zm11.425 3.958c.47-.03.928-.076 1.37-.14-1.04.87-2.23 1.44-3.54 1.62-2.9.4-5.28-.7-6.6-2.3 1.67.84 3.95 1.24 6.22.98.87-.1 1.75-.27 2.55-.16zm-3.47-1.3c-2.69-.38-4.92-2.02-4.91-3.62 0-.6.28-1.15.77-1.57.9-.77 2.47-1.29 4.43-1.4.79-.04 1.59.01 2.39.14.9.15 1.73.42 2.48.8.58.3 1.2.67 1.52 1.17.32.5.34 1.07.09 1.58-.18.37-.53.72-.99.97-.87.5-2.07.84-3.44.9-.77.03-1.54 0-2.31-.03zm10.84-6.15c.3-.3.56-.63.78-1 .43-.73.6-1.57.47-2.36-.33-1.96-2.01-3.37-3.8-4.12-1.58-.67-3.4-1-5.1-.97-2.02.04-4.2.52-5.98 1.6-1.34.82-2.28 1.95-2.67 3.3-.29 1.01-.24 2.06.14 3.02.07.18.16.35.26.52-.14-.56-.2-1.14-.17-1.72.07-1.4.7-2.6 1.73-3.5 1.14-1 2.7-1.65 4.35-1.9 1.3-.2 2.68-.18 3.96.1 1.25.27 2.44.79 3.36 1.6.73.64 1.26 1.45 1.37 2.33.1.77-.12 1.53-.6 2.1zm.01 7.08c2.22-1.26 3.7-3.36 3.7-5.73 0-.73-.15-1.44-.44-2.1-.57-1.3-1.7-2.4-3.1-3.14-1.4-.75-3.09-1.14-4.84-1.13-1.86.01-3.76.47-5.33 1.38-1.6.93-2.77 2.25-3.26 3.78-.29.9-.32 1.85-.1 2.77.23.92.72 1.77 1.42 2.48-.34-.6-.56-1.28-.62-1.98-.1-1.16.25-2.28.95-3.22.74-1 1.82-1.78 3.08-2.27 1.24-.49 2.64-.7 4-.63 1.3.07 2.58.38 3.64.98.96.55 1.68 1.33 1.94 2.22.2.68.1 1.38-.27 2.02-.3.52-.78.97-1.35 1.3l.58-.11z"/></svg>
      </span>
      <span class="s-label">Sign in with Amazon</span>
    </button>

  </div>
</section>

<div id="site-footer"></div>

<script>
  const SUPABASE_URL = 'https://uaofatcgdvpcysaviima.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhb2ZhdGNnZHZwY3lzYXZpaW1hIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3Njc5MzkxOCwiZXhwIjoyMDkyMzY5OTE4fQ.2OrLyCNhNBYgiIwlIEJGoAWi6QyAUugd16TEIdbCqWQ';

  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('register-form');
  const submitBtn = document.getElementById('submit-btn');
  const statusMsg = document.getElementById('status-msg');

  function showStatus(msg, type) {
    statusMsg.textContent = msg;
    statusMsg.className = 'status-msg ' + type;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const firstName = document.getElementById('first-name').value.trim();
    const lastName  = document.getElementById('last-name').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;

    if (!firstName || !lastName || !email || !password) {
      showStatus('Please fill in all fields.', 'error');
      return;
    }
    if (password.length < 8) {
      showStatus('Password must be at least 8 characters.', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating Accountâ€¦';

    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: { first_name: firstName, last_name: lastName },
        emailRedirectTo: window.location.origin + '/register.html'
      }
    });

    if (error) {
      showStatus(error.message, 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create My Account';
      return;
    }

    if (data.user && data.user.identities && data.user.identities.length === 0) {
      showStatus('An account with this email already exists. Please log in.', 'error');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create My Account';
      return;
    }

    showStatus('Account created! Check your email to confirm your address.', 'success');
    form.reset();
    submitBtn.disabled = false;
    submitBtn.textContent = 'Create My Account';
  });

  async function signInWithProvider(provider) {
    const { error } = await sb.auth.signInWithOAuth({
      provider,
      options: {
        redirectTo: window.location.origin + '/register.html'
      }
    });
    if (error) showStatus('Could not connect to ' + provider + ': ' + error.message, 'error');
  }
</script>
<script src="scripts/layout.js"></script>
<script src="scripts/auth.js"></script>
</body>
</html>
